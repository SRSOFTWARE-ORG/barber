name: i18n & Tests

# Falha o build quando há chaves de tradução faltando entre pt-BR, pt-PT, es e en,
# e roda os testes unitários (inclui paridade de chaves e persistência de idioma).

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: i18n key parity check
        run: bun run check:i18n

      - name: Unit tests
        run: bun run test
